<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5DADE2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="url(#bgGradient)"/>
  
  <!-- Heart with sprout icon -->
  <g transform="translate(96, 96)">
    <!-- Heart -->
    <path d="M 0,-20 C -25,-45 -60,-30 -60,-10 C -60,10 -30,35 0,55 C 30,35 60,10 60,-10 C 60,-30 25,-45 0,-20 Z" 
          fill="white" opacity="0.95"/>
    
    <!-- Sprout/leaf -->
    <g transform="translate(0, -35)">
      <path d="M 0,0 Q -8,-12 -5,-20 Q 0,-15 0,0 Z" fill="#6FCF97"/>
      <path d="M 0,0 Q 8,-12 5,-20 Q 0,-15 0,0 Z" fill="#6FCF97"/>
      <line x1="0" y1="0" x2="0" y2="-20" stroke="#6FCF97" stroke-width="2"/>
    </g>
  </g>
</svg>
